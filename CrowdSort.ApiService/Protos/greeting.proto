syntax = "proto3";

import "google/api/annotations.proto";
package CrowdSort.Services;

service Greeting
{
  rpc Greeter (GreetRequest) returns (GreetReply)
  {
    option (google.api.http) =
    {
      get: "/greet/{name}",
    };
  }
}

message GreetRequest
{
  string name = 1;
}

message GreetReply
{
  string message = 1;
}