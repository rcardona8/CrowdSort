syntax = "proto3";

import "google/api/annotations.proto";
package CrowdSort.Services;

service Greeter
{
  rpc Hello (HelloRequest) returns (HelloReply)
  {
    option (google.api.http) =
    {
      get: "/greeter/{name}",
    };
  }
}

message HelloRequest
{
  string name = 1;
}

message HelloReply
{
  string message = 1;
}