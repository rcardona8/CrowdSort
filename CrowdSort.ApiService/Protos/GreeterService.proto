syntax = "proto3";
import "google/api/annotations.proto";
import "Protos/GreeterContracts.proto";
package CrowdSort.Services;

service Greeter
{
  rpc GreetGet (CrowdSort.Contracts.Greeter.GreetRequest) returns (CrowdSort.Contracts.Greeter.GreetReply)
  {
    option (google.api.http) =
    {
      get: "/greet/{name}",
    };
  }
}